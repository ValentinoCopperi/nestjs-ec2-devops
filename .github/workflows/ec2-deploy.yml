name: Deploy to EC2

on:
  push:
    branches:
      - ec2-branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: valencopperi/nestjs-deploy-ec2:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull valencopperi/nestjs-deploy-ec2:latest
            docker rm -f nestjs-app
            docker run -d -p 3000:3000 --name nestjs-app --env-file .env valencopperi/nestjs-deploy-ec2:latest
